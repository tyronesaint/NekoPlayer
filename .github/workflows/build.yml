name: Build NekoPlayer

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build for iOS
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build iOS (Debug)
      run: |
        xcodebuild -project Anime4KMetal.xcodeproj \
          -scheme "NekoPlayer (iOS)" \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true

    - name: Build iOS (Release)
      run: |
        xcodebuild -project Anime4KMetal.xcodeproj \
          -scheme "NekoPlayer (iOS)" \
          -configuration Release \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true

    - name: Upload iOS Artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: NekoPlayer-iOS
        path: |
          ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app
          ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphonesimulator/*.app
        retention-days: 7
        if-no-files-found: warn

  build-tvos:
    name: Build for tvOS
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build tvOS
      run: |
        xcodebuild -project Anime4KMetal.xcodeproj \
          -scheme "NekoPlayer (tvOS)" \
          -configuration Release \
          -sdk appletvsimulator \
          -destination 'platform=tvOS Simulator,name=Apple TV' \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true

    - name: Upload tvOS Artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: NekoPlayer-tvOS
        path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-appletvsimulator/*.app
        retention-days: 7
        if-no-files-found: warn

  build-macos:
    name: Build for macOS
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build macOS
      run: |
        xcodebuild -project Anime4KMetal.xcodeproj \
          -scheme "NekoPlayer (iOS)" \
          -configuration Release \
          -destination 'platform=macOS' \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true

    - name: Upload macOS Artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: NekoPlayer-macOS
        path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-macos/*.app
        retention-days: 7
        if-no-files-found: warn

  build-summary:
    name: Build Summary
    runs-on: macos-latest
    needs: [build-ios, build-tvos, build-macos]
    if: always()

    steps:
    - name: Generate Summary
      run: |
        echo "## 🐱 NekoPlayer Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Build Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| iOS | ${{ needs.build-ios.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| tvOS | ${{ needs.build-tvos.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| macOS | ${{ needs.build-macos.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Features" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Anime4K Metal Shaders" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ WebDAV Integration" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Multi-platform Support" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Neko Theme Design" >> $GITHUB_STEP_SUMMARY
